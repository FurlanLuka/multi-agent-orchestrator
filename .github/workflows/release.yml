name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: macos-arm64
            pkg-target: node18-macos-arm64
            binary-name: orchy-macos-arm64
          - platform: macos-latest
            target: macos-x64
            pkg-target: node18-macos-x64
            binary-name: orchy-macos-x64
          - platform: ubuntu-latest
            target: linux-x64
            pkg-target: node18-linux-x64
            binary-name: orchy-linux-x64
          - platform: windows-latest
            target: windows-x64
            pkg-target: node18-win-x64
            binary-name: orchy-windows-x64.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Obfuscate backend code
        run: npm run obfuscate -w orchestrator-backend

      - name: Build web frontend
        run: npm run build:web

      - name: Copy web assets into backend for embedding
        run: cp -r orchestrator-web/dist orchestrator-backend/web-dist
        shell: bash

      - name: Install pkg
        run: npm install -g pkg

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build backend binary with embedded assets
        run: cd orchestrator-backend && pkg . --targets ${{ matrix.pkg-target }} --output ../dist/${{ matrix.binary-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary-name }}
          path: dist/${{ matrix.binary-name }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Prepare release files
        run: |
          mkdir -p release
          # Copy binaries to release folder
          cp artifacts/orchy-macos-arm64/orchy-macos-arm64 release/
          cp artifacts/orchy-macos-x64/orchy-macos-x64 release/
          cp artifacts/orchy-linux-x64/orchy-linux-x64 release/
          cp artifacts/orchy-windows-x64.exe/orchy-windows-x64.exe release/
          # Make Unix binaries executable
          chmod +x release/orchy-macos-arm64 release/orchy-macos-x64 release/orchy-linux-x64
          ls -la release/

      - name: Get version
        id: version
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Orchy ${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: |
            release/orchy-macos-arm64
            release/orchy-macos-x64
            release/orchy-linux-x64
            release/orchy-windows-x64.exe
          body: |
            ## Orchy ${{ steps.version.outputs.version }}

            Multi-agent orchestrator for Claude Code.

            ### Installation

            **macOS (Apple Silicon):**
            ```bash
            curl -L -o orchy https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/orchy-macos-arm64
            chmod +x orchy
            ./orchy
            ```

            **macOS (Intel):**
            ```bash
            curl -L -o orchy https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/orchy-macos-x64
            chmod +x orchy
            ./orchy
            ```

            **Linux (x64):**
            ```bash
            curl -L -o orchy https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/orchy-linux-x64
            chmod +x orchy
            ./orchy
            ```

            **Windows (x64):**
            Download `orchy-windows-x64.exe` and run it.

            **Homebrew:**
            ```bash
            brew install orchyai/tap/orchy
            ```

            ### Usage

            ```bash
            orchy                    # Start server, open browser
            orchy --port 8080        # Use specific port
            orchy --no-browser       # Don't open browser
            ```

            ### Features

            - **Single binary** - Web UI and setup files are embedded
            - **Auto port** - Finds free port starting from 3456
            - **Auto browser** - Opens browser automatically (use --no-browser to disable)

            ### Requirements

            - Claude Code CLI must be installed: `npm install -g @anthropic-ai/claude-code`
            - Run `claude auth` to authenticate before using Orchy

            ### Changes

            See the [full changelog](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.version }}) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: build-release
    runs-on: ubuntu-latest
    if: "!contains(github.event.inputs.version || github.ref_name, '-')"  # Skip for pre-releases

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/orchy-macos-arm64/orchy-macos-arm64 release/
          cp artifacts/orchy-macos-x64/orchy-macos-x64 release/
          cp artifacts/orchy-linux-x64/orchy-linux-x64 release/
          chmod +x release/*
          ls -la release/

      - name: Calculate SHA256 checksums
        id: sha
        run: |
          echo "macos_arm64=$(sha256sum release/orchy-macos-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "macos_x64=$(sha256sum release/orchy-macos-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x64=$(sha256sum release/orchy-linux-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: orchyai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Get version
        id: version
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create release in homebrew-tap repo
        uses: softprops/action-gh-release@v1
        with:
          repository: orchyai/homebrew-tap
          tag_name: ${{ steps.version.outputs.version }}
          name: Orchy ${{ steps.version.outputs.version }}
          files: |
            release/orchy-macos-arm64
            release/orchy-macos-x64
            release/orchy-linux-x64
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula in tap
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"  # Remove 'v' prefix

          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/orchy.rb << 'FORMULA'
          class Orchy < Formula
            desc "Multi-agent orchestrator for Claude Code"
            homepage "https://github.com/orchyai/homebrew-tap"
          FORMULA

          cat >> homebrew-tap/Formula/orchy.rb << EOF
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/orchyai/homebrew-tap/releases/download/${VERSION}/orchy-macos-arm64"
                sha256 "${{ steps.sha.outputs.macos_arm64 }}"
              end
              on_intel do
                url "https://github.com/orchyai/homebrew-tap/releases/download/${VERSION}/orchy-macos-x64"
                sha256 "${{ steps.sha.outputs.macos_x64 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/orchyai/homebrew-tap/releases/download/${VERSION}/orchy-linux-x64"
                sha256 "${{ steps.sha.outputs.linux_x64 }}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "orchy-macos-arm64" => "orchy"
                else
                  bin.install "orchy-macos-x64" => "orchy"
                end
              elsif OS.linux?
                bin.install "orchy-linux-x64" => "orchy"
              end
            end

            def caveats
              <<~EOS
                To get started, run:
                  orchy

                This starts the orchestrator and opens http://localhost:3456 in your browser.

                Options:
                  orchy --port 8080     # Use specific port
                  orchy --no-browser    # Don't open browser automatically
                  orchy --help          # Show all options

                Requirements:
                  Claude Code CLI must be installed:
                  npm install -g @anthropic-ai/claude-code
              EOS
            end

            test do
              assert_match "version", shell_output("\#{bin}/orchy --help")
            end
          end
          EOF

      - name: Commit and push to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/orchy.rb
          git diff --staged --quiet || git commit -m "Update orchy to ${{ github.event.inputs.version || github.ref_name }}"
          git push
