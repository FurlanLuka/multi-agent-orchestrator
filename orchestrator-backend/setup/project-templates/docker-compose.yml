services:
  backend:
    image: ghcr.io/OWNER/PROJECT-backend:latest
    expose:
      - "3000"
    env_file: .env
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/OWNER/PROJECT-frontend:latest
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  backend-data:
