services:
  backend:
    image: PROJECT-backend:local
    expose:
      - "3000"
    environment:
      - DATABASE_URL=file:/app/data/test.db
      - PORT=3000
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    image: PROJECT-frontend:local
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  backend-data:
